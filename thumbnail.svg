<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1B2A4A"/>
    <stop offset="100%" style="stop-color:#15203A"/>
  </linearGradient>
  <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
</defs>

<!-- Background -->
<rect width="1280" height="720" fill="url(#bg)"/>

<!-- Grid pattern -->
<g opacity="0.1">
  <line x1="0" y1="80" x2="1280" y2="80" stroke="#FFFFFF" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="1280" y2="400" stroke="#FFFFFF" stroke-width="0.5"/>
</g>

<!-- Header -->
<rect x="0" y="0" width="1280" height="80" fill="#0F1729"/>
<text x="40" y="52" fill="#D4A843" font-family="Arial,sans-serif" font-size="32" font-weight="bold">PRO TRADING JOURNAL</text>
<text x="480" y="50" fill="#FFFFFF" font-family="Arial,sans-serif" font-size="18" opacity="0.6">Built by a Hedge Fund Trader</text>

<!-- Left Panel: Dashboard -->
<rect x="40" y="110" width="580" height="270" rx="12" fill="#2C3E6B" filter="url(#shadow)"/>
<text x="65" y="148" fill="#D4A843" font-family="Arial,sans-serif" font-size="18" font-weight="bold">DASHBOARD</text>

<!-- Metric boxes -->
<g>
  <rect x="65" y="170" width="125" height="80" rx="8" fill="#1B2A4A"/>
  <text x="80" y="198" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Win Rate</text>
  <text x="80" y="230" fill="#27AE60" font-family="Arial,sans-serif" font-size="24" font-weight="bold">67.3%</text>

  <rect x="210" y="170" width="125" height="80" rx="8" fill="#1B2A4A"/>
  <text x="225" y="198" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Net P&amp;L</text>
  <text x="225" y="230" fill="#27AE60" font-family="Arial,sans-serif" font-size="24" font-weight="bold">+$12.4K</text>

  <rect x="355" y="170" width="125" height="80" rx="8" fill="#1B2A4A"/>
  <text x="370" y="198" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Profit Factor</text>
  <text x="370" y="230" fill="#D4A843" font-family="Arial,sans-serif" font-size="24" font-weight="bold">2.34</text>

  <rect x="500" y="170" width="100" height="80" rx="8" fill="#1B2A4A"/>
  <text x="515" y="198" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Avg R</text>
  <text x="515" y="230" fill="#3498DB" font-family="Arial,sans-serif" font-size="24" font-weight="bold">1.82</text>
</g>

<!-- Second row metrics -->
<g>
  <rect x="65" y="265" width="125" height="80" rx="8" fill="#1B2A4A"/>
  <text x="80" y="293" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Total Trades</text>
  <text x="80" y="325" fill="#FFFFFF" font-family="Arial,sans-serif" font-size="24" font-weight="bold">147</text>

  <rect x="210" y="265" width="125" height="80" rx="8" fill="#1B2A4A"/>
  <text x="225" y="293" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Best Trade</text>
  <text x="225" y="325" fill="#27AE60" font-family="Arial,sans-serif" font-size="24" font-weight="bold">+$2,340</text>

  <rect x="355" y="265" width="125" height="80" rx="8" fill="#1B2A4A"/>
  <text x="370" y="293" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Worst Trade</text>
  <text x="370" y="325" fill="#E74C3C" font-family="Arial,sans-serif" font-size="24" font-weight="bold">-$890</text>

  <rect x="500" y="265" width="100" height="80" rx="8" fill="#1B2A4A"/>
  <text x="515" y="293" fill="#8899AA" font-family="Arial,sans-serif" font-size="12">Max DD</text>
  <text x="515" y="325" fill="#E74C3C" font-family="Arial,sans-serif" font-size="24" font-weight="bold">-$1,200</text>
</g>


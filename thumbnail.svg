<!-- Equity curve -->
<polyline points="80,670 120,660 160,665 200,650 240,640 280,620 320,625 360,600 400,590 440,570 480,580 520,560 560,540" fill="none" stroke="#D4A843" stroke-width="3"/>
<polygon points="80,670 120,660 160,665 200,650 240,640 280,620 320,625 360,600 400,590 440,570 480,580 520,560 560,540 560,670 80,670" fill="#D4A843" opacity="0.08"/>
